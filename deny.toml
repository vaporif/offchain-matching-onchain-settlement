[advisories]
ignore = [
    # paste crate unmaintained - transitive dependency, no direct replacement available yet
    "RUSTSEC-2024-0436",
    # bincode v1 unmaintained - intentional choice, v2 has incompatible API
    "RUSTSEC-2025-0141",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "Unlicense",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
