[profile.default]
src = "src"
out = "out"
libs = ["node_modules"]
auto_detect_solc = false
offline = true
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
    "forge-std/=node_modules/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

[fmt]
line_length = 100
